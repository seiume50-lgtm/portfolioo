<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ばけ / bake</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD93D;
      --orange: #FF6B35;
      --orange2: #FF9500;
      --cream: #FFF8EC;
      --dark: #1A1A1A;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      font-family: 'Zen Maru Gothic', sans-serif;
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ノイズテクスチャ背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 24px;
      overflow: hidden;
      background: var(--dark);
    }

    .hero-video-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .hero-video-bg iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 177.78vh;
      height: 100vh;
      min-width: 100%;
      min-height: 56.25vw;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .hero-video-bg iframe.loaded {
      opacity: 1;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.3) 50%,
        rgba(0,0,0,0.7) 100%
      );
      z-index: 0;
    }

   
    .hero-avatar {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 15%;
      border: 4px solid var(--dark);
      box-shadow: 6px 6px 0 var(--dark);
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease both;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-tag {
      display: inline-block;
      background: var(--orange);
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 99px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease both;
    }

    .hero-name-ja {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(72px, 18vw, 140px);
      font-weight: 900;
      line-height: 1;
      color: var(--white);
      animation: fadeDown 0.7s ease 0.1s both;
    }

    .hero-name-en {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(20px, 5vw, 36px);
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.2em;
      margin-top: 8px;
      animation: fadeDown 0.7s ease 0.2s both;
    }

    .hero-catch {
      margin-top: 28px;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      color: var(--dark);
      background: var(--yellow);
      display: inline-block;
      padding: 10px 24px;
      border-radius: 12px;
      border: 2px solid var(--dark);
      box-shadow: 4px 4px 0 var(--dark);
      animation: fadeDown 0.7s ease 0.3s both;
    }

    .hero-sub {
      margin-top: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      animation: fadeDown 0.7s ease 0.4s both;
    }

    /* SNSボタン */
    .sns-links {
      margin-top: 36px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeDown 0.7s ease 0.5s both;
    }

    .sns-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: 2px solid var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .sns-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--dark);
    }

    .sns-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--dark);
    }

    .sns-btn.x {
      background: var(--dark);
      color: var(--white);
    }

    .sns-btn.twitcast {
      background: var(--orange);
      color: var(--white);
    }

    /* スクロール矢印 */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      animation: bounce 2s ease-in-out infinite;
      font-size: 28px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION共通 ===== */
    section {
      padding: 80px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 3px;
      background: linear-gradient(to right, var(--orange), transparent);
      border-radius: 99px;
    }

    /* ===== SKILLS ===== */
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill-tag {
      background: var(--white);
      border: 2px solid var(--dark);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 3px 3px 0 var(--dark);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }

    .skill-tag:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--dark);
      background: var(--yellow);
    }

    /* ===== WORKS ===== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .work-card {
      background: var(--white);
      border: 2px solid var(--dark);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 5px 5px 0 var(--dark);
      text-decoration: none;
      color: var(--dark);
      transition: transform 0.15s, box-shadow 0.15s;
      display: block;
    }

    .work-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 var(--dark);
    }

    .work-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--dark);
    }

    .work-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .work-info {
      padding: 16px;
    }

    .work-platform {
      display: inline-block;
      background: var(--orange);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .work-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 100%;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        var(--orange) 0px,
        var(--orange) 20px,
        var(--yellow) 20px,
        var(--yellow) 40px
      );
      opacity: 0.4;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 13px;
      color: #999;
      font-weight: 700;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .works-grid {
        grid-template-columns: 1fr;
      }
      .sns-links {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

  <script>
    // ========================================
    // ⚠️ APIキーをここに貼り付けてください！
    const API_KEY = 'AIzaSyArx29Iv5R6UdxiwMTNLUT2oxvvRU9b82A'; //
    // ========================================
    const PLAYLIST_ID = 'PLZYBjttKyfxU1w57iU1A2IjjX02fAIr2h';

    let videoIds = [];
    let currentIndex = 0;
    let player;

    // 再生リストから動画IDを取得
    async function fetchPlaylist() {
      try {
        const res = await fetch(
          `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}`
        );
        const data = await res.json();
        if (data.items) {
          videoIds = data.items.map(item => item.contentDetails.videoId);
          // ランダムな順番に並び替え
          videoIds.sort(() => Math.random() - 0.5);
          loadPlayer();
        }
      } catch (e) {
        console.log('動画取得エラー:', e);
      }
    }

    // YouTube IFrame APIの読み込み
    function loadPlayer() {
      if (videoIds.length === 0) return;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    // IFrame API準備完了時に呼ばれる
    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('ytPlayer', {
        videoId: videoIds[currentIndex],
        playerVars: {
          autoplay: 1,
          mute: 1,
          controls: 0,
          loop: 0,
          playsinline: 1,
          disablekb: 1,
          fs: 0,
          rel: 0,
          showinfo: 0,
          modestbranding: 1,
        },
        events: {
          onReady: (e) => {
            e.target.playVideo();
            document.getElementById('ytPlayer').classList.add('loaded');
          },
          onStateChange: (e) => {
            // 動画が終わったら次の動画へ
            if (e.data === YT.PlayerState.ENDED) {
              currentIndex = (currentIndex + 1) % videoIds.length;
              player.loadVideoById(videoIds[currentIndex]);
            }
          }
        }
      });

      // iframeをvideoBgに追加
      document.getElementById('videoBg').appendChild(
        document.getElementById('ytPlayer')
      );
    };

    // iframeを先に作っておく
    const iframe = document.createElement('div');
    iframe.id = 'ytPlayer';
    document.getElementById('videoBg').appendChild(iframe);

    // スタート！
    fetchPlaylist();
  </script>
